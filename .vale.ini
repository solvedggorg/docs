# Mintlify Vale CI — relative StylesPath (required when customizing)
StylesPath = styles
MinAlertLevel = suggestion

# Inline HTML tags to ignore
IgnoredScopes = code, tt, img, url, a
SkippedScopes = script, style, pre, figure

# Product / project vocabulary (styles/config/vocabularies/Mintlify/)
Vocab = Mintlify

# Parse MDX as MD to avoid fragility with JSX
[formats]
mdx = md

# English content
[*.{md,mdx}]
BasedOnStyles = Vale
Vale.Terms = NO

# Ignore JSX/MDX-specific syntax patterns
TokenIgnores = (?sm)((?:import|export) .+?$), \
(?<!`)(<\w+ ?.+ ?\/>)(?!`), \
(<[A-Z]\w+>.+?<\/[A-Z]\w+>), \
\{[^}]*\}

BlockIgnores = (?sm)^(<\w+\n .*\s\/>)$, \
(?sm)^({.+.*})

# Spanish locale: disable checks. Match both relative and absolute paths
# (Mintlify CI often invokes Vale with absolute file paths).
[es/**/*.{md,mdx}]
BasedOnStyles =
Vale.Spelling = NO

[es/*.{md,mdx}]
BasedOnStyles =
Vale.Spelling = NO

[**/es/**/*.{md,mdx}]
BasedOnStyles =
Vale.Spelling = NO

[**/es/*.{md,mdx}]
BasedOnStyles =
Vale.Spelling = NO
